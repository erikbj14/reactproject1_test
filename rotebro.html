<body>
    <script>var map = new ol.Map({
        target: 'osm-map',
        layers: [
            new ol.layer.Tile({
                source: new ol.source.OSM()
            })
        ],
        view: new ol.View({
            center: ol.proj.fromLonLat([17.91164 + 0.0200, 59.4442]),//0,0045 är ca 500 m
        zoom: 15 // You can adjust the zoom level as needed
        })})</script>
