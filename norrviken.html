<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OpenStreetMap</title>
    <meta content="text/html; charset=UTF-8; X-Content-Type-Options=nosniff" http-equiv="Content-Type" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.rawgit.com/openlayers/openlayers.github.io/master/en/v5.3.0/css/ol.css" />
    <script src="https://cdn.rawgit.com/openlayers/openlayers.github.io/master/en/v5.3.0/build/ol.js"></script>
    <style>
    table {
        background-color:rgba(255, 99, 71, 0.5);
    }

        /* Set the map height */
        #osm-map {
            position: absolute;
            height: 700px;
            width: 500px;
            top: 146px;
            left: 8px;
        }
   
        .dropdown {
            bottom: 100%;
            display: none;
            position: absolute;
            top: 450px; /* Adjust the top position as needed */
            left: 10px; /* Adjust the left position as needed */
            display: inline-block;
            z-index: 4000;
        }
   
            .dropdown:hover .dropdown-content {
                display: block;
                bottom: 100%;
            }
   
        .dropbtn {
            background-color: #3498DB;
            color: white;
            padding: 16px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }
   
            .dropbtn:hover, .dropbtn:focus {
                background-color: #2980B9;
            }
   
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f1f1f1;
            min-width: 160px;
            overflow: auto;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
        }

        #popup2 {
            position: absolute;
            top: 225px;
            left: 100px;
            height: 90px;
            width: 500px;
            opacity: 0.4;
            background-color: blue;
            padding: 10px;
            border-radius: 5px;
            max-width: 500px;
            z-index: 3500;
        }
   
        #popup3 {
            position: absolute;
            top: 245px;
            left: 150px;
            font-size: 50px;
            color: blue;
            font-size: 50px;
            z-index: 2; /* Set a higher z-index value */
        }
    </style>
</head>
<body>
    
    <div id="osm-map">
        <div class="dropdown">

            <a href="index.html">
                <button>Tillbaka</button>
            </a>
            </div>
        </div>

        <div id="popup-container">
            <!--Tabell över parkeringar-->
            
            <!-- <div id="popup-content"> -->
            <!--</div>-->
        </div>

        <script>
            var map = new ol.Map({
    target: 'osm-map',
    layers: [
        new ol.layer.Tile({
            source: new ol.source.OSM()
        })
    ],
    view: new ol.View({
                    center: ol.proj.fromLonLat([17.9242, 59.459]), 
                    zoom: 15 // You can adjust the zoom level as needed
    })})
        

        // Marker 1 Häggvik
const marker1 = new ol.Feature({
    geometry: new ol.geom.Point(ol.proj.fromLonLat([17.9242, 59.459])),
});

const markerStyle1 = new ol.style.Style({
    image: new ol.style.Icon({
        anchor: [0.5, 1],
        src: './location-dot-solid.svg',
        scale: 2,
    }),
});

marker1.setStyle(markerStyle1);

const vectorSource = new ol.source.Vector({
    features: [marker1],
});

const vectorLayer = new ol.layer.Vector({
    source: vectorSource,
});
map.addLayer(vectorLayer);

// Stationsvägen/ Postvägen 9024
const marker2 = new ol.Feature({
    geometry: new ol.geom.Point(ol.proj.fromLonLat([17.92488, 59.45849])), // Adjust the longitude value
});

const markerStyle2 = new ol.style.Style({
    image: new ol.style.Icon({
        anchor: [0.5, 1],
        //src: './Bild4.png', //Gjorde en bild som liknade en polygon
        src: './parking.svg',
        scale: 2,
    }),
});

marker2.setStyle(markerStyle2);

const vectorSource2 = new ol.source.Vector({
    features: [marker2], // Use marker2 as the feature
});

const vectorLayer2 = new ol.layer.Vector({
    source: vectorSource2, // Use vectorSource2 for the source
});

map.addLayer(vectorLayer2);

// Skolvägen
const marker3 = new ol.Feature({
    geometry: new ol.geom.Point(ol.proj.fromLonLat([17.92299, 59.45626])), // Adjust the longitude value
});

const markerStyle3 = new ol.style.Style({
    image: new ol.style.Icon({
        anchor: [0.5, 1],
        //src: './Bild4.png', //Gjorde en bild som liknade en polygon
        src: './parking2.svg',
        scale: 2,
    }),
});

marker3.setStyle(markerStyle3);

const vectorSource3 = new ol.source.Vector({
    features: [marker3], // Use marker2 as the feature
});

const vectorLayer3 = new ol.layer.Vector({
    source: vectorSource3, // Use vectorSource2 for the source
});

map.addLayer(vectorLayer3);


</script>

<table width="500" border="0">
    <tr>
        <th width="15"><img src="parking.svg"></th>
        <th colspan="4" align="left">Pendelparkering</th>
        <th width="15"><img src="parking2.svg"></th>
        <th colspan="4" align="left">Alternativa parkeringar</th>
    </tr>
    <tr>
        <th width="15"></th>
        <td colspan="4" align="left" id="demo" onmouseover="mouseOver('demo')" onmouseout="mouseOut('demo')" class="highlight_Andelsvagen">Andelsvägen</td>
        <th width="15"></th>
        <td colspan="4" align="left" id="demo2" onmouseover="mouseOver('demo2')" onmouseout="mouseOut('demo2')" class="highlight_smedjevägen">Smedjevägen</td>
    </tr>
    <tr>
        <th width="15"></th>
        <td colspan="4"></td>
        <th width="15"></th>
        <td colspan="4" align="left" id="demo3" onmouseover="mouseOver('demo3')" onmouseout="mouseOut('demo3')" class="highlight_hammarbacken">Hammarbacken</td>
    </tr>
</tr>
<tr style="height:10px">
    <th width="15"></th>
    <td colspan="4"></td>
    <th width="15"></th>
    <td colspan="4"></td>
</tr>
    <tr>
        <td width="15"><img src="train.svg"></td>
        <td colspan="6" align="left">Tåg-tider <a href="https://www.trafikverket.se/trafikinformation/tag/?Station=H%C3%A4ggvik&ArrDep=departure" target="_blank">Häggvik</a>&nbsp; Trafikverket</td>
        <td colspan="3" align="center" style="padding: 0px; font-size: 1px;" id="start">
            <button id="reloadButton" hidden="true">Visningsläge</button><!--Gör att knappen kommer upp vid zoom-->
        </td>
    </tr>
</table>
</body>
</html>
